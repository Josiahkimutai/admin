<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - Joskev Loans</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(212,175,55,.3);
    border-top:5px solid #d4af37;
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#d4af37;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.input-box input:focus{
    outline:none;
    border-color:#d4af37;
    box-shadow:0 0 10px rgba(212,175,55,.4);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#d4af37,#b8860b);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.note{
    margin-top:15px;
    text-align:center;
    color:#888;
    font-size:13px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
👑 JOSKEV ADMIN
</div>

<p class="subtitle">
Secure Administration Portal
</p>

<div class="input-box">
<input
type="password"
id="otp"
placeholder="Enter Admin OTP">
</div>

<button onclick="verifyOTP()">
Login
</button>

<div class="message" id="message"></div>

<div class="note">
Testing OTP: 123456
</div>

</div>

<script>

async function verifyOTP(){

    const otp =
    document.getElementById("otp").value.trim();

    const message =
    document.getElementById("message");

    if(!otp){

        message.innerHTML =
        "❌ Enter OTP";

        return;

    }

    if(otp !== "123456"){

        message.innerHTML =
        "❌ Invalid OTP";

        return;

    }

    localStorage.setItem(
        "adminLoggedIn",
        "true"
    );

    message.innerHTML =
    "✅ Login Successful";

    setTimeout(() => {

        window.location.href =
        "admin-dashboard.html";

    },1000);

}

</script>

</body>
</html>
