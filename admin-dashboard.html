<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOSKEV Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f5f5f5}
header{background:linear-gradient(135deg,#0f0f0f,#1f1f1f);padding:20px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.logo{color:#d4af37;font-size:30px;font-weight:bold}
.btn{background:#d4af37;color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
.container{padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.08);text-align:center}
.card h3{color:#d4af37}
.card p{font-size:28px;font-weight:bold;margin-top:10px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
input,select{padding:12px;border:1px solid #ddd;border-radius:8px}
#search{flex:1}
.table-wrap{background:#fff;padding:15px;border-radius:15px;overflow:auto}
table{width:100%;border-collapse:collapse}
th{background:#d4af37;color:#fff;padding:12px}
td{padding:10px;border-bottom:1px solid #eee}
.status-approved{color:green;font-weight:bold}
.status-rejected{color:red;font-weight:bold}
.status-pending{color:orange;font-weight:bold}
.action{padding:6px 10px;border:none;border-radius:6px;color:#fff;cursor:pointer;margin:2px}
.approve{background:#28a745}
.reject{background:#dc3545}
.delete{background:#555}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5)}
.modal-content{background:#fff;max-width:500px;margin:80px auto;padding:20px;border-radius:15px}
</style>
</head>
<body>
<header>
<div class="logo">👑 JOSKEV ADMIN</div>
<button class="btn" onclick="logoutAdmin()">Logout</button>
</header>

<div class="container">
<div class="stats">
<div class="card"><h3>Total Applications</h3><p id="totalApps">0</p></div>
<div class="card"><h3>Verified</h3><p id="verifiedApps">0</p></div>
<div class="card"><h3>Approved</h3><p id="approvedApps">0</p></div>
<div class="card"><h3>Rejected</h3><p id="rejectedApps">0</p></div>
</div>

<div class="toolbar">
<input id="search" placeholder="Search customer..." onkeyup="filterTable()">
<select id="statusFilter" onchange="filterTable()">
<option value="">All Statuses</option>
<option>Pending</option>
<option>Waiting Disbursement</option>
<option>Rejected</option>
</select>
<button class="btn" onclick="loadApplications()">Refresh</button>
</div>

<div class="table-wrap">
<table id="applicationsTable">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Amount</th>
<th>Verified</th><th>Status</th><th>Date</th><th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2>Customer Details</h2>
<div id="details"></div><br>
<button class="btn" onclick="closeModal()">Close</button>
</div>
</div>

<script>
if(localStorage.getItem("adminLoggedIn")!=="true"){
 window.location.href="index.html";
}

const supabaseUrl="https://iuzacikghsrvmvlfspgd.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1emFjaWtnaHNydm12bGZzcGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzExOTIsImV4cCI6MjA5NjQwNzE5Mn0.3IThzg9nUmnzDWUM_Dv7JmIKBO61PHb7O8lcL1tpTUU";
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let applications=[];

async function loadApplications(){

const {data,error}=await supabaseClient
.from("applications")
.select("*")
.order("id",{ascending:false});

if(error){
alert(error.message);
return;
}

applications=data||[];

document.getElementById("totalApps").innerText=
applications.length;

document.getElementById("verifiedApps").innerText=
applications.filter(x=>x.is_verified).length;

document.getElementById("approvedApps").innerText=
applications.filter(
x=>x.loan_status==="Waiting Disbursement"
).length;

document.getElementById("rejectedApps").innerText=
applications.filter(
x=>x.loan_status==="Rejected"
).length;

renderTable(applications);
}

function renderTable(rows){

let html="";

rows.forEach(app=>{

let cls=(app.loan_status||"Pending")
.replace(/\s+/g,"-")
.toLowerCase();

html+=`

 <tr>

 <td>${app.id}</td>

 <td>
 ${app.first_name||""}
 ${app.last_name||""}
 </td>

 <td>${app.phone||""}</td>

 <td>${app.email||""}</td>

 <td>KES ${app.amount||0}</td>

 <td>
 ${app.is_verified?"✅":"❌"}
 </td>

 <td class="status-${cls}">
 ${app.loan_status||"Pending"}
 </td>

 <td>
 ${new Date(app.created_at)
 .toLocaleDateString()}
 </td>

 <td>

<button
class="action approve"
onclick="updateStatus(
'${app.phone}',
'Waiting Disbursement',
'${app.email}',
'${app.first_name}'
)">
Approve </button>

<button
class="action reject"
onclick="updateStatus(
'${app.phone}',
'Rejected',
'${app.email}',
'${app.first_name}'
)">
Reject </button>

<button
class="action delete"
onclick="deleteApp(
'${app.phone}'
)">
Delete </button>

<button
class="action"
style="background:#007bff"
onclick='viewDetails(${JSON.stringify(app)})'>
View </button>

 </td>

 </tr>`;
 });

document.getElementById(
"tableBody"
).innerHTML=html;
}

function filterTable(){

const q=
document.getElementById("search")
.value.toLowerCase();

const st=
document.getElementById("statusFilter")
.value;

const filtered=
applications.filter(a=>{

const txt=
JSON.stringify(a)
.toLowerCase();

const ok1=
txt.includes(q);

const ok2=
!st ||
(a.loan_status||"Pending")===st;

return ok1 && ok2;

});

renderTable(filtered);
}

async function updateStatus(
phone,
status,
email,
firstName
){

const { error } =
await supabaseClient
.from("applications")
.update({
loan_status:status
})
.eq("phone",phone);

if(error){
alert(error.message);
return;
}

if(
status==="Waiting Disbursement"
){

try{

await fetch(
"https://iuzacikghsrvmvlfspgd.supabase.co/functions/v1/send-loan-email",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
first_name:firstName
})
}
);

}catch(err){

console.log(err);

}

}

alert("Status updated successfully");

loadApplications();
}

async function deleteApp(phone){

if(!confirm(
"Delete application?"
)) return;

await supabaseClient
.from("applications")
.delete()
.eq("phone",phone);

loadApplications();
}

function viewDetails(app){

document.getElementById(
"details"
).innerHTML=`

 <p><b>Name:</b>
 ${app.first_name||""}
 ${app.last_name||""}
 </p>

 <p><b>Phone:</b>
 ${app.phone||""}
 </p>

 <p><b>Email:</b>
 ${app.email||""}
 </p>

 <p><b>Amount:</b>
 KES ${app.amount||0}
 </p>

 <p><b>Verified:</b>
 ${app.is_verified}
 </p>

 <p><b>Status:</b>
 ${app.loan_status||"Pending"}
 </p>
 `;

document.getElementById(
"modal"
).style.display="block";
}

function closeModal(){

document.getElementById(
"modal"
).style.display="none";
}

function logoutAdmin(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href=
"index.html";
}

loadApplications();
</script>
</body>
</html>
