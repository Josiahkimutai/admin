<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - Joskev Loans</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(212,175,55,.3);
    border-top:5px solid #d4af37;
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#d4af37;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.input-box input:focus{
    outline:none;
    border-color:#d4af37;
    box-shadow:0 0 10px rgba(212,175,55,.4);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#d4af37,#b8860b);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:red;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:13px;
}

</style>

</head>
<body>

<div class="login-card">

<div class="logo">
👑 JOSKEV ADMIN
</div>

<p class="subtitle">
Secure Administration Portal
</p>

<div class="input-box">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<button onclick="loginAdmin()">
Login
</button>

<div class="message" id="message"></div>

<div class="footer">
Joskev Loans Administration Panel
</div>

</div>

<script>

function loginAdmin(){

    const username =
    document.getElementById("username").value.trim();

    const password =
    document.getElementById("password").value.trim();

    const message =
    document.getElementById("message");

    if(username === "admin" &&
       password === "admin123"){

        localStorage.setItem(
            "adminLoggedIn",
            "true"
        );

        window.location.href =
        "admin-dashboard.html";

    }else{

        message.innerHTML =
        "❌ Invalid Username or Password";

    }

}

</script>

</body>
</html>
